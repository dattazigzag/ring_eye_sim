name: Export macOS (Apple Silicon)

# TWO WAYS TO RUN:
#   - Manual test: Actions tab -> this workflow -> "Run workflow" (workflow_dispatch).
#       Produces a downloadable artifact on the run page. Does NOT create a release.
#   - Real release: push a version tag, e.g. git tag v1.0.0 && git push origin v1.0.0
#       Produces the artifact AND a GitHub Release with the zip attached.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write          # lets GITHUB_TOKEN create the release (private repo OK)

env:
  PROCESSING_VERSION: "4.5.2"
  # GitHub release tag carries a build number, so it can't be derived from the version
  PROCESSING_TAG: "processing-1313-4.5.2"
  # sha256 of processing-4.5.2-macos-aarch64.dmg (from the 4.5.2 release page)
  PROCESSING_DMG_SHA256: "27772a40761ae02ee470cdebb6a8e4a8265926b55771b7249a40d006d4e818ef"
  SKETCH: "Processing/ring_eye_sim_artnet_sender"
  ARTIFACT_BASENAME: "ring_eye_sim"

jobs:
  export:
    runs-on: macos-15            # Apple Silicon (arm64). macos-14 / macos-26 also arm64.
    timeout-minutes: 30

    steps:
      - name: "1 · Checkout repository"
        uses: actions/checkout@v4

      - name: "2 · Resolve version label"
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            LABEL="${GITHUB_REF_NAME}"          # e.g. v1.0.0  (tag push -> release)
          else
            LABEL="dev-${GITHUB_SHA::7}"        # e.g. dev-1a2b3c4  (manual test run)
          fi
          echo "label=${LABEL}" >> "$GITHUB_OUTPUT"
          echo "Build label: ${LABEL}"

      - name: "3 · Download Processing ${{ env.PROCESSING_VERSION }} (arm64 DMG)"
        run: |
          URL="https://github.com/processing/processing4/releases/download/${PROCESSING_TAG}/processing-${PROCESSING_VERSION}-macos-aarch64.dmg"
          echo "Downloading: $URL"
          curl -L --fail -o processing.dmg "$URL"
          ls -lh processing.dmg

      - name: "4 · Verify checksum & install Processing to /Applications"
        run: |
          echo "${PROCESSING_DMG_SHA256}  processing.dmg" | shasum -a 256 -c -
          hdiutil attach processing.dmg -nobrowse -mountpoint /Volumes/Processing
          cp -R "/Volumes/Processing/Processing.app" /Applications/
          hdiutil detach /Volumes/Processing
          test -x "/Applications/Processing.app/Contents/MacOS/Processing" && echo "Processing CLI present."

      - name: "5 · Prepare sketchbook"
        run: mkdir -p "$HOME/Documents/Processing/libraries"

      - name: "6 · Download Video library (GStreamer arm64 natives)"
        run: |
          curl -L --fail -o video.zip \
            "https://github.com/processing/processing-video/releases/download/latest/video.zip"
          ls -lh video.zip

      - name: "7 · Install libraries into sketchbook (Video + vendored)"
        run: |
          unzip -q video.zip -d "$HOME/Documents/Processing/libraries/"
          cp -R ci/libraries/* "$HOME/Documents/Processing/libraries/"

      - name: "8 · Verify installed libraries"
        run: |
          echo "Libraries in sketchbook:"
          ls -1 "$HOME/Documents/Processing/libraries/"

      - name: "9 · Export application (macos-aarch64)"
        run: |
          /Applications/Processing.app/Contents/MacOS/Processing cli \
            --sketch="${GITHUB_WORKSPACE}/${SKETCH}" \
            --output="${GITHUB_WORKSPACE}/${SKETCH}/build" \
            --no-java \
            --variant=macos-aarch64 \
            --force \
            --export

      - name: "9b · Patch Info.plist (reverse-DNS id + Local Network prompt)"
        run: |
          APP="${GITHUB_WORKSPACE}/${SKETCH}/build/ring_eye_sim_artnet_sender.app"
          PLIST="$APP/Contents/Info.plist"
          # Raw export uses a bare bundle id; macOS TCC behaves better with reverse-DNS.
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier is.zigzag.ring-eye-sim" "$PLIST"
          # WITHOUT this key macOS 26 silently denies LAN/broadcast UDP -> no Art-Net.
          /usr/libexec/PlistBuddy -c "Add :NSLocalNetworkUsageDescription string 'Sends Art-Net DMX to LED ring receivers on the local network.'" "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Set :NSLocalNetworkUsageDescription 'Sends Art-Net DMX to LED ring receivers on the local network.'" "$PLIST"
          echo "Patched:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$PLIST"
          /usr/libexec/PlistBuddy -c "Print :NSLocalNetworkUsageDescription" "$PLIST"
          # Signed next, in step 9c (macOS 26 needs a real identity, not ad-hoc).

      - name: "9b2 · Embed app icon (.icns from data/icon.png) — before signing"
        run: |
          APP="${GITHUB_WORKSPACE}/${SKETCH}/build/ring_eye_sim_artnet_sender.app"
          PLIST="$APP/Contents/Info.plist"
          SRC="${GITHUB_WORKSPACE}/${SKETCH}/data/icon.png"
          if [ ! -f "$SRC" ]; then
            echo "No data/icon.png committed — skipping app icon (build continues)."
            exit 0
          fi
          # The exported bundle's Resources dir must exist before we write into
          # it (a missing dir is one way the earlier iconutil path could fail).
          mkdir -p "$APP/Contents/Resources"
          ICNS="$APP/Contents/Resources/icon.icns"

          # Primary: multi-resolution .icns via an .iconset + iconutil.
          # Fallback: if iconutil balks (it failed on the runner before with
          # "Failed to generate ICNS"), convert the 512px PNG straight to .icns
          # with sips. Best-effort throughout: any failure logs a warning and
          # continues, so a cosmetic icon never breaks the build.
          ICONSET="$RUNNER_TEMP/icon.iconset"
          rm -rf "$ICONSET"; mkdir -p "$ICONSET"
          icns_ok=0
          if sips -z 16 16   "$SRC" --out "$ICONSET/icon_16x16.png"      >/dev/null 2>&1 \
          && sips -z 32 32   "$SRC" --out "$ICONSET/icon_16x16@2x.png"   >/dev/null 2>&1 \
          && sips -z 32 32   "$SRC" --out "$ICONSET/icon_32x32.png"      >/dev/null 2>&1 \
          && sips -z 64 64   "$SRC" --out "$ICONSET/icon_32x32@2x.png"   >/dev/null 2>&1 \
          && sips -z 128 128 "$SRC" --out "$ICONSET/icon_128x128.png"    >/dev/null 2>&1 \
          && sips -z 256 256 "$SRC" --out "$ICONSET/icon_128x128@2x.png" >/dev/null 2>&1 \
          && sips -z 256 256 "$SRC" --out "$ICONSET/icon_256x256.png"    >/dev/null 2>&1 \
          && sips -z 512 512 "$SRC" --out "$ICONSET/icon_256x256@2x.png" >/dev/null 2>&1 \
          && sips -z 512 512 "$SRC" --out "$ICONSET/icon_512x512.png"    >/dev/null 2>&1 \
          && iconutil -c icns "$ICONSET" -o "$ICNS" >/dev/null 2>&1; then
            icns_ok=1; echo "icon.icns generated via iconutil (multi-res)"
          elif sips -s format icns "$SRC" --out "$ICNS" >/dev/null 2>&1; then
            icns_ok=1; echo "icon.icns generated via sips fallback"
          fi

          if [ "$icns_ok" = "1" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleIconFile icon" "$PLIST" \
              || /usr/libexec/PlistBuddy -c "Add :CFBundleIconFile string icon" "$PLIST"
            /usr/libexec/PlistBuddy -c "Set :CFBundleIconName icon" "$PLIST" \
              || /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string icon" "$PLIST"
            echo "Embedded icon.icns (pre-signing):"
            ls -l "$APP/Contents/Resources/" | grep -i icns || true
          else
            echo "WARNING: could not generate icon.icns — continuing without a custom icon."
          fi

      - name: "9c · Sign the app (self-signed identity from repo secrets)"
        env:
          P12_BASE64:   ${{ secrets.MACOS_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          APP="${GITHUB_WORKSPACE}/${SKETCH}/build/ring_eye_sim_artnet_sender.app"
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KPW="$(openssl rand -base64 24)"

          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"

          # throwaway keychain, unlocked, kept in the search list so codesign finds the identity
          security create-keychain -p "$KPW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPW" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)

          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KPW" "$KEYCHAIN"

          codesign --force --deep --keychain "$KEYCHAIN" --sign "RingEyeSim Local" "$APP"
          codesign -dv --verbose=4 "$APP" 2>&1 | grep -E 'Authority|Identifier' || true
          codesign --verify --deep --strict --verbose=2 "$APP"

          # scrub secret material from the runner
          rm -f "$RUNNER_TEMP/cert.p12"
          security delete-keychain "$KEYCHAIN"

      - name: "9d · Add 'START HERE' helper for end users"
        run: |
          BUILD="${GITHUB_WORKSPACE}/${SKETCH}/build"
          # friendly spaced name in the zip; chmod so the exec bit survives download/unzip
          cp "${GITHUB_WORKSPACE}/ci/START_HERE.command" "$BUILD/START HERE.command"
          chmod +x "$BUILD/START HERE.command"
          ls -l "$BUILD"

      - name: "10 · Package build into a zip"
        run: |
          ZIP="${ARTIFACT_BASENAME}-${{ steps.ver.outputs.label }}-macos-aarch64.zip"
          cd "${GITHUB_WORKSPACE}/${SKETCH}/build"
          # -y preserves symlinks (GStreamer frameworks rely on them)
          zip -r -y "${GITHUB_WORKSPACE}/${ZIP}" .
          ls -lh "${GITHUB_WORKSPACE}/${ZIP}"

      - name: "11 · Upload run artifact (every run, incl. manual tests)"
        uses: actions/upload-artifact@v4
        with:
          name: "${{ env.ARTIFACT_BASENAME }}-${{ steps.ver.outputs.label }}-macos-aarch64"
          path: "${{ env.ARTIFACT_BASENAME }}-${{ steps.ver.outputs.label }}-macos-aarch64.zip"
          if-no-files-found: error

      - name: "12 · Create GitHub Release (tag pushes only)"
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "${ARTIFACT_BASENAME}-${GITHUB_REF_NAME}-macos-aarch64.zip" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
